extends: substitution
message: "Use '%s' — avoid 'utilize' and its variants."
level: warning
ignorecase: true
swap:
  '\butilizes\b': 'uses'
  '\butilized\b': 'used'
  '\butilizing\b': 'using'
  '\butilize\b': 'use'
  '\butilises\b': 'uses'
  '\butilised\b': 'used'
  '\butilising\b': 'using'
  '\butilise\b': 'use'
