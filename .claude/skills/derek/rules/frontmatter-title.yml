message: "The title field is required. If the title contains a colon or other special characters, it must be enclosed in double or single quotes."
level: error
reason: "This rule triggers when the frontmatter block is missing a title field. It also triggers when the title value contains a colon (:), hash (#), or other YAML-special character and is not enclosed in quotes — unquoted titles with special characters are invalid YAML. Do not flag unquoted titles that contain only plain alphanumeric text and spaces, as these are valid YAML plain scalars."
